cat > index.html <<'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🧠 Simple XOR AI (brain.js)</title>
  <style>
    body {font-family:system-ui, sans-serif; max-width: 600px; margin:2rem auto; padding:1rem;}
    h1 {text-align:center;}
    .box {margin:1rem 0;}
    label {margin-right:0.5rem;}
    button {padding:0.5rem 1rem; font-size:1rem;}
    #result {font-weight:bold; margin-top:1rem;}
  </style>
  <!-- brain.js CDN – tiny, pure‑JS neural‑net library -->
  <script src="https://cdn.jsdelivr.net/npm/brain.js@2.0.0-beta.2/dist/brain-browser.min.js"></script>
</head>
<body>
  <h1>🧠 Tiny XOR AI (runs in your browser)</h1>

  <div class="box">
    <label for="in1">Input 1 (0 or 1):</label>
    <input id="in1" type="number" min="0" max="1" step="1" value="0">
  </div>

  <div class="box">
    <label for="in2">Input 2 (0 or 1):</label>
    <input id="in2" type="number" min="0" max="1" step="1" value="0">
  </div>

  <button id="predictBtn">🤖 Predict XOR</button>

  <div id="result"></div>

  <script>
    // -------------------------------------------------
    // 1️⃣  Build & train the tiny neural net (once, on load)
    // -------------------------------------------------
    const net = new brain.NeuralNetwork({
      hiddenLayers: [2]   // two hidden neurons – more than enough for XOR
    });

    // Training data – the XOR truth table
    const trainingData = [
      { input: [0, 0], output: [0] },
      { input: [0, 1], output: [1] },
      { input: [1, 0], output: [1] },
      { input: [1, 1], output: [0] }
    ];

    // Train (the call is synchronous for tiny data)
    net.train(trainingData, {
      iterations: 20000,
      log: false
    });

    // -------------------------------------------------
    // 2️⃣  UI – read numbers, run the network, show result
    // -------------------------------------------------
    document.getElementById('predictBtn').addEventListener('click', () => {
      const a = Number(document.getElementById('in1').value);
      const b = Number(document.getElementById('in2').value);

      // Simple validation
      if (![0,1].includes(a) || ![0,1].includes(b)) {
        document.getElementById('result').textContent = '❗ Please enter only 0 or 1.';
        return;
      }

      const output = net.run([a, b]);          // e.g. [0.987] or [0.03]
      const rounded = Math.round(output[0]);   // 0 or 1

      document.getElementById('result').innerHTML =
        `🧮 ${a} XOR ${b} = <strong>${rounded}</strong> (raw: ${output[0].toFixed(3)})`;
    });
  </script>
</body>
</html>
EOF
